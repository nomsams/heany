<!DOCTYPE html>
<html lang="sv" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XML Date Formatter Pro</title>
    
    <!-- JSZip via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        /* --- CSS Variables & Theming --- */
        :root {
            --bg-body: #f5f5f7; /* Apple light gray */
            --bg-card: #ffffff;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --accent: #0071e3; /* Apple blue */
            --accent-hover: #0077ed;
            --border: #d2d2d7;
            --dropzone-bg: #fafafa;
            --dropzone-hover: #f0f8ff;
            --log-bg: #1e1e1e;
            --log-text: #d4d4d4;
            --success: #34c759;
            --error: #ff3b30;
            --info: #32ade6;
            --disabled-bg: #e5e5ea;
            --disabled-text: #aeaeb2;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            --radius-card: 18px;
            --radius-btn: 10px;
            --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        [data-theme="dark"] {
            --bg-body: #000000;
            --bg-card: #1c1c1e;
            --text-main: #f5f5f7;
            --text-muted: #98989d;
            --accent: #0a84ff;
            --accent-hover: #409cff;
            --border: #38383a;
            --dropzone-bg: #2c2c2e;
            --dropzone-hover: #3a3a3c;
            --log-bg: #000000;
            --log-text: #e5e5ea;
            --success: #32d74b;
            --error: #ff453a;
            --info: #64d2ff;
            --disabled-bg: #3a3a3c;
            --disabled-text: #636366;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* --- Reset & Base --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: var(--font-stack);
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            transition: background-color 0.4s ease, color 0.4s ease;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Layout --- */
        .app-container {
            width: 100%;
            max-width: 760px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding: 0 10px;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .controls { display: flex; gap: 12px; }

        .icon-btn {
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .icon-btn:hover {
            background: var(--dropzone-bg);
            transform: translateY(-1px);
        }

        .card {
            background-color: var(--bg-card);
            border-radius: var(--radius-card);
            padding: 40px;
            box-shadow: var(--shadow);
            transition: background-color 0.4s ease, box-shadow 0.4s ease;
        }

        /* --- Dropzone --- */
        .dropzone {
            border: 2px dashed var(--border);
            border-radius: 14px;
            padding: 50px 20px;
            text-align: center;
            background-color: var(--dropzone-bg);
            transition: all 0.3s ease;
            margin-bottom: 24px;
            position: relative;
        }

        .dropzone.dragover {
            border-color: var(--accent);
            background-color: var(--dropzone-hover);
            transform: scale(1.01);
        }

        .dropzone * { pointer-events: none; } /* Prevent drag flicker */
        .dropzone .btn-upload { pointer-events: auto; } /* Re-enable for button */

        .dropzone svg {
            color: var(--accent);
            margin-bottom: 16px;
            width: 54px;
            height: 54px;
        }

        .dropzone h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .dropzone p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .btn-upload {
            background-color: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 10px 24px;
            border-radius: var(--radius-btn);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-upload:hover {
            background-color: var(--accent);
            color: #fff;
        }

        /* --- Progress & Status --- */
        .progress-wrapper { margin-bottom: 24px; }
        
        .progress-track {
            height: 8px;
            background-color: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--accent);
            border-radius: 4px;
            transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .status-text {
            font-size: 0.95rem;
            color: var(--text-muted);
            text-align: center;
            font-weight: 500;
        }

        /* --- Action Buttons --- */
        .actions {
            display: flex;
            gap: 16px;
            margin-bottom: 30px;
        }

        .btn-main {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: var(--radius-btn);
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: var(--accent);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-main:hover:not(:disabled) {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
        }

        .btn-main:active:not(:disabled) { transform: translateY(0); }

        .btn-main:disabled {
            background-color: var(--disabled-bg);
            color: var(--disabled-text);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* --- Tooltip Logic --- */
        .tooltip-container {
            flex: 1;
            display: flex;
            position: relative;
        }
        
        .tooltip-container .btn-main { width: 100%; }

        .tooltip-container[data-tooltip]:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            pointer-events: none;
            margin-bottom: 10px;
            opacity: 0;
            animation: fadeIn 0.2s forwards 0.1s;
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* --- Logs --- */
        .logs-header {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .logs-window {
            background-color: var(--log-bg);
            color: var(--log-text);
            font-family: "SF Mono", Menlo, Consolas, "Courier New", monospace;
            font-size: 1rem; /* Större text enligt önskemål */
            padding: 20px;
            border-radius: 12px;
            height: 260px;
            overflow-y: auto;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
            line-height: 1.5;
        }

        .log-entry { margin-bottom: 6px; word-break: break-all; }
        .log-time { color: #888; margin-right: 8px; font-size: 0.9em; }
        .log-error { color: var(--error); }
        .log-success { color: var(--success); }
        .log-info { color: var(--info); }

        /* --- Scrollbar styling för loggen --- */
        .logs-window::-webkit-scrollbar { width: 8px; }
        .logs-window::-webkit-scrollbar-track { background: transparent; }
        .logs-window::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        .logs-window::-webkit-scrollbar-thumb:hover { background: #777; }

        /* --- Responsiveness --- */
        @media (max-width: 650px) {
            .card { padding: 24px; }
            .actions { flex-direction: column; }
            header { flex-direction: column; align-items: flex-start; gap: 16px; }
            .controls { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1 id="ui-title">XML Date Formatter</h1>
            <div class="controls">
                <button class="icon-btn" id="btn-lang" onclick="toggleLanguage()">🇬🇧 English</button>
                <button class="icon-btn" id="btn-theme" onclick="toggleTheme()">🌙 Mörkt</button>
            </div>
        </header>
        
        <main class="card">
            <!-- Dropzone -->
            <div class="dropzone" id="dropzone">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <h3 id="ui-drop-title">Dra och släpp XML-filer här</h3>
                <p id="ui-drop-sub">eller klicka på knappen nedan för att bläddra</p>
                <button class="btn-upload" id="ui-btn-upload" onclick="document.getElementById('fileInput').click()">Välj filer</button>
                <input type="file" id="fileInput" multiple accept=".xml" style="display: none;">
            </div>
            
            <!-- Progress -->
            <div class="progress-wrapper">
                <div class="progress-track">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
                <p class="status-text" id="statusText">Väntar på filer...</p>
            </div>
            
            <!-- Actions -->
            <div class="actions">
                <button class="btn-main" id="btn-process" onclick="processFiles()" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    <span id="ui-btn-process">Bearbeta Filer</span>
                </button>
                
                <button class="btn-main" id="btn-download-ind" onclick="downloadIndividually()" disabled>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    <span id="ui-btn-download-ind">Ladda ner</span>
                </button>
                
                <div class="tooltip-container" id="zip-tooltip-wrapper">
                    <button class="btn-main" id="btn-download-zip" onclick="downloadZip()" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                        <span id="ui-btn-download-zip">Ladda ner som ZIP</span>
                    </button>
                </div>
            </div>
            
            <!-- Logs -->
            <h3 class="logs-header" id="ui-logs-title">Händelselogg</h3>
            <div class="logs-window" id="logsWindow"></div>
        </main>
    </div>

    <script>
        // --- State Management ---
        let state = {
            lang: 'sv',
            theme: 'light',
            filesToProcess: [],
            processedFiles:[]
        };

        // --- Translations ---
        const i18n = {
            sv: {
                title: "XML Date Formatter",
                dropTitle: "Dra och släpp XML-filer här",
                dropSub: "eller klicka på knappen nedan för att bläddra",
                btnUpload: "Välj filer",
                btnProcess: "Bearbeta Filer",
                btnDownloadSingle: "Ladda ner",
                btnDownloadMulti: "Ladda ner separat",
                btnDownloadZip: "Ladda ner som ZIP",
                logsTitle: "Händelselogg",
                langToggle: "🇬🇧 English",
                themeDark: "🌙 Mörkt",
                themeLight: "☀️ Ljust",
                statusWaiting: "Väntar på filer...",
                statusReady: "Redo att bearbeta {0} fil(er).",
                statusProcessing: "Bearbetar fil {0} av {1}...",
                statusDone: "Klar! {0} fil(er) bearbetade.",
                logInit: "System redo. Vänligen välj filer för att börja.",
                logFilesSelected: "{0} XML-fil(er) inlästa. Redo för bearbetning.",
                logStarted: "Startar bearbetning...",
                logProcessed: "Klar: {0} -> {1}",
                logError: "Fel vid bearbetning av {0}: {1}",
                logFinished: "Alla filer har bearbetats framgångsrikt.",
                logZipStart: "Skapar ZIP-arkiv...",
                logZipDone: "ZIP-fil skapad och nedladdning startad.",
                logDownloadStart: "Startar nedladdning...",
                logDownloadDone: "Nedladdning slutförd.",
                zipTooltip: "Detta alternativ stöds endast för flera filer.",
                zipFilename: "Bearbetade_XML_Filer.zip"
            },
            en: {
                title: "XML Date Formatter",
                dropTitle: "Drag and drop XML files here",
                dropSub: "or click the button below to browse",
                btnUpload: "Choose files",
                btnProcess: "Process Files",
                btnDownloadSingle: "Download",
                btnDownloadMulti: "Download Separately",
                btnDownloadZip: "Download as ZIP",
                logsTitle: "Event Log",
                langToggle: "🇸🇪 Svenska",
                themeDark: "🌙 Dark",
                themeLight: "☀️ Light",
                statusWaiting: "Waiting for files...",
                statusReady: "Ready to process {0} file(s).",
                statusProcessing: "Processing file {0} of {1}...",
                statusDone: "Done! {0} file(s) processed.",
                logInit: "System ready. Please select files to begin.",
                logFilesSelected: "{0} XML file(s) loaded. Ready to process.",
                logStarted: "Starting processing...",
                logProcessed: "Done: {0} -> {1}",
                logError: "Error processing {0}: {1}",
                logFinished: "All files processed successfully.",
                logZipStart: "Generating ZIP archive...",
                logZipDone: "ZIP file generated and download started.",
                logDownloadStart: "Starting download...",
                logDownloadDone: "Download completed.",
                zipTooltip: "This option is only supported for multiple files.",
                zipFilename: "Processed_XML_Files.zip"
            }
        };

        const t = (key) => i18n[state.lang][key];

        // --- DOM Elements ---
        const els = {
            dropzone: document.getElementById('dropzone'),
            fileInput: document.getElementById('fileInput'),
            progressBar: document.getElementById('progressBar'),
            statusText: document.getElementById('statusText'),
            btnProcess: document.getElementById('btn-process'),
            btnDownloadInd: document.getElementById('btn-download-ind'),
            btnDownloadZip: document.getElementById('btn-download-zip'),
            zipTooltipWrapper: document.getElementById('zip-tooltip-wrapper'),
            logsWindow: document.getElementById('logsWindow'),
            btnTheme: document.getElementById('btn-theme'),
            btnLang: document.getElementById('btn-lang')
        };

        // --- Initialization ---
        function init() {
            updateTextUI();
            log(t('logInit'), 'info');
            setupDragAndDrop();
        }

        // --- UI & Theming ---
        function toggleTheme() {
            state.theme = state.theme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', state.theme);
            els.btnTheme.innerText = state.theme === 'light' ? t('themeDark') : t('themeLight');
        }

        function toggleLanguage() {
            state.lang = state.lang === 'sv' ? 'en' : 'sv';
            updateTextUI();
            updateStateUI();
        }

        function updateTextUI() {
            document.getElementById('ui-title').innerText = t('title');
            document.getElementById('ui-drop-title').innerText = t('dropTitle');
            document.getElementById('ui-drop-sub').innerText = t('dropSub');
            document.getElementById('ui-btn-upload').innerText = t('btnUpload');
            document.getElementById('ui-btn-process').innerText = t('btnProcess');
            document.getElementById('ui-btn-download-zip').innerText = t('btnDownloadZip');
            document.getElementById('ui-logs-title').innerText = t('logsTitle');
            
            els.btnLang.innerText = t('langToggle');
            els.btnTheme.innerText = state.theme === 'light' ? t('themeDark') : t('themeLight');
            
            // Update dynamic texts based on state
            if (state.processedFiles.length > 0) {
                document.getElementById('ui-btn-download-ind').innerText = state.processedFiles.length === 1 ? t('btnDownloadSingle') : t('btnDownloadMulti');
                if (state.processedFiles.length === 1) {
                    els.zipTooltipWrapper.setAttribute('data-tooltip', t('zipTooltip'));
                } else {
                    els.zipTooltipWrapper.removeAttribute('data-tooltip');
                }
            } else {
                document.getElementById('ui-btn-download-ind').innerText = t('btnDownloadSingle');
            }
        }

        function updateStateUI() {
            if (state.filesToProcess.length === 0) {
                els.statusText.innerText = t('statusWaiting');
                els.btnProcess.disabled = true;
                els.btnDownloadInd.disabled = true;
                els.btnDownloadZip.disabled = true;
                els.progressBar.style.width = '0%';
                els.zipTooltipWrapper.removeAttribute('data-tooltip');
            } else if (state.processedFiles.length === state.filesToProcess.length) {
                els.statusText.innerText = t('statusDone').replace('{0}', state.processedFiles.length);
                els.btnProcess.disabled = true;
                els.btnDownloadInd.disabled = false;
                
                // Logic for 1 vs multiple files
                if (state.processedFiles.length === 1) {
                    document.getElementById('ui-btn-download-ind').innerText = t('btnDownloadSingle');
                    els.btnDownloadZip.disabled = true;
                    els.zipTooltipWrapper.setAttribute('data-tooltip', t('zipTooltip'));
                } else {
                    document.getElementById('ui-btn-download-ind').innerText = t('btnDownloadMulti');
                    els.btnDownloadZip.disabled = false;
                    els.zipTooltipWrapper.removeAttribute('data-tooltip');
                }
            } else {
                els.statusText.innerText = t('statusReady').replace('{0}', state.filesToProcess.length);
                els.btnProcess.disabled = false;
                els.btnDownloadInd.disabled = true;
                els.btnDownloadZip.disabled = true;
                els.progressBar.style.width = '0%';
                els.zipTooltipWrapper.removeAttribute('data-tooltip');
            }
        }

        // --- Logging ---
        function log(msg, type = 'info') {
            const time = new Date().toLocaleTimeString('sv-SE', { hour12: false });
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.innerHTML = `<span class="log-time">[${time}]</span> ${msg}`;
            els.logsWindow.appendChild(entry);
            els.logsWindow.scrollTop = els.logsWindow.scrollHeight;
        }

        // --- File Handling ---
        function setupDragAndDrop() {
            els.dropzone.addEventListener('dragover', (e) => {
                e.preventDefault();
                els.dropzone.classList.add('dragover');
            });

            els.dropzone.addEventListener('dragleave', () => {
                els.dropzone.classList.remove('dragover');
            });

            els.dropzone.addEventListener('drop', (e) => {
                e.preventDefault();
                els.dropzone.classList.remove('dragover');
                handleFiles(e.dataTransfer.files);
            });

            els.fileInput.addEventListener('change', (e) => {
                handleFiles(e.target.files);
                els.fileInput.value = ''; // Reset input
            });
        }

        function handleFiles(fileList) {
            const xmlFiles = Array.from(fileList).filter(f => f.name.toLowerCase().endsWith('.xml'));
            
            if (xmlFiles.length === 0) {
                log(t('logError').replace('{0}', 'Upload').replace('{1}', 'No XML files found.'), 'error');
                return;
            }

            // Reset state for new batch
            state.filesToProcess = xmlFiles;
            state.processedFiles =[];
            
            log(t('logFilesSelected').replace('{0}', xmlFiles.length), 'info');
            updateStateUI();
        }

        // --- Core Processing Logic ---
        async function processFiles() {
            els.btnProcess.disabled = true;
            log(t('logStarted'), 'info');
            state.processedFiles =[];
            
            for (let i = 0; i < state.filesToProcess.length; i++) {
                let file = state.filesToProcess[i];
                els.statusText.innerText = t('statusProcessing').replace('{0}', i + 1).replace('{1}', state.filesToProcess.length);
                
                try {
                    // Read file content
                    let content = await file.text();
                    
                    // Regex 1: Replace DATE="DD.MM.YYYY" with DATE="YYYY-MM-DD"
                    let updatedContent = content.replace(/DATE="(\d{2})\.(\d{2})\.(\d{4})"/g, 'DATE="$3-$2-$1"');
                    
                    // Regex 2: Fix double quotes DATE="YYYY-MM-DD"" to DATE="YYYY-MM-DD"
                    updatedContent = updatedContent.replace(/DATE="(\d{4}-\d{2}-\d{2})""/g, 'DATE="$1"');
                    
                    // Generate new filename
                    let newFileName = file.name.replace(/\.xml$/i, "_KLAR.xml");
                    
                    state.processedFiles.push({ name: newFileName, content: updatedContent });
                    log(t('logProcessed').replace('{0}', file.name).replace('{1}', newFileName), 'success');
                    
                } catch (err) {
                    log(t('logError').replace('{0}', file.name).replace('{1}', err.message), 'error');
                }
                
                // Update Progress
                let percent = ((i + 1) / state.filesToProcess.length) * 100;
                els.progressBar.style.width = `${percent}%`;
                
                // Small delay to allow UI to breathe
                await new Promise(r => setTimeout(r, 10));
            }
            
            log(t('logFinished'), 'success');
            updateStateUI();
        }

        // --- Download Logic ---
        async function downloadIndividually() {
            log(t('logDownloadStart'), 'info');
            
            for (let i = 0; i < state.processedFiles.length; i++) {
                let pf = state.processedFiles[i];
                const blob = new Blob([pf.content], { type: "application/xml" });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = pf.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                // Clean up memory
                setTimeout(() => URL.revokeObjectURL(url), 1000);
                
                // Delay to prevent browser blocking multiple downloads
                if (state.processedFiles.length > 1) {
                    await new Promise(r => setTimeout(r, 400));
                }
            }
            log(t('logDownloadDone'), 'success');
        }

        async function downloadZip() {
            if (typeof JSZip === 'undefined') {
                log("JSZip library not loaded. Check internet connection.", "error");
                return;
            }
            
            log(t('logZipStart'), 'info');
            els.btnDownloadZip.disabled = true; // Prevent double clicks
            
            try {
                const zip = new JSZip();
                state.processedFiles.forEach(pf => {
                    zip.file(pf.name, pf.content);
                });
                
                const blob = await zip.generateAsync({ type: "blob" });
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = t('zipFilename');
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                setTimeout(() => URL.revokeObjectURL(url), 1000);
                log(t('logZipDone'), 'success');
            } catch (err) {
                log(t('logError').replace('{0}', 'ZIP').replace('{1}', err.message), 'error');
            } finally {
                els.btnDownloadZip.disabled = false;
            }
        }

        // Boot up
        init();
